const L = DATA.lang_labels;
let curModel = DATA.models[0], curVert = "overall", curMode = "absolute";

const selM = document.getElementById("selModel");
const selV = document.getElementById("selVertical");
DATA.models.forEach(m => { const o = document.createElement("option"); o.value=m; o.textContent=m; selM.appendChild(o); });
Object.entries(DATA.vertical_labels).forEach(([k,v]) => { const o = document.createElement("option"); o.value=k; o.textContent=v; selV.appendChild(o); });
selM.addEventListener("change", () => { curModel=selM.value; render(); });
selV.addEventListener("change", () => { curVert=selV.value; render(); });
document.querySelectorAll(".mode-btn").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active"); curMode=b.dataset.mode; render();
}));

function render() {
    const raw = DATA.matrices[curModel+"|"+curVert];
    if (!raw) return;
    const n = raw.length, enEn = raw[0][0];
    const isRel = curMode === "relative";
    const z = isRel ? raw.map(r => r.map(v => enEn>0 ? v/enEn*100 : 0)) : raw;
    const rng = DATA.ranges[curVert] || [0.25, 0.50];
    const [zmin,zmax] = isRel ? [50,105] : rng;
    const cs = isRel
        ? [[0,"#b71c1c"],[0.2,"#e53935"],[0.45,"#ef9a9a"],[0.6,"#fff9c4"],[0.8,"#a5d6a7"],[0.9,"#43a047"],[1,"#1b5e20"]]
        : [[0,"#d32f2f"],[0.15,"#e57373"],[0.3,"#ffcdd2"],[0.5,"#ffffff"],[0.7,"#bbdefb"],[0.85,"#42a5f5"],[1,"#1565c0"]];
    const fmt = isRel ? v=>v.toFixed(1)+"%" : v=>v.toFixed(3);
    const ann = [];
    for (let i=0;i<n;i++) for (let j=0;j<n;j++) {
        const v=z[i][j];
        const tc = isRel ? (v<70||v>98?"white":"black") : (v<0.35||v>0.55?"white":"black");
        ann.push({x:L[j],y:L[i],text:fmt(v),showarrow:false,font:{size:8,color:tc}});
    }
    const ht = z.map((r,i) => r.map((v,j) => {
        const s = L[i]+" → "+L[j]+"<br>";
        return isRel ? s+v.toFixed(1)+"% of En→En<br>Raw: "+raw[i][j].toFixed(4) : s+"NDCG@10: "+v.toFixed(4);
    }));
    const flat=z.flat(), mean=flat.reduce((a,b)=>a+b,0)/flat.length;
    const diag=[]; for(let i=0;i<n;i++) diag.push(z[i][i]);
    const dm=diag.reduce((a,b)=>a+b,0)/diag.length;
    document.getElementById("stats").innerHTML = isRel
        ? "Mean: <b>"+mean.toFixed(1)+"%</b> | Diagonal: <b>"+dm.toFixed(1)+"%</b> | En→En: <b>"+enEn.toFixed(4)+"</b>"
        : "Mean: <b>"+mean.toFixed(4)+"</b> | Diagonal: <b>"+dm.toFixed(4)+"</b> | En→En: <b>"+enEn.toFixed(4)+"</b>";
    Plotly.react("chart",[{type:"heatmap",z:z,x:L,y:L,zmin:zmin,zmax:zmax,colorscale:cs,
        hoverinfo:"text",hovertext:ht,showscale:true,
        colorbar:{title:{text:isRel?"% of En→En":"NDCG@10"},len:0.85}}],
        {title:{text:curModel+" — "+(DATA.vertical_labels[curVert]||curVert)+" — "+(isRel?"% of En→En":"NDCG@10"),font:{size:16,family:"Inter"}},
         xaxis:{title:"Document Language",tickfont:{size:10},tickangle:-45},
         yaxis:{title:"Query Language",tickfont:{size:10},autorange:"reversed"},
         annotations:ann,margin:{l:100,r:80,t:60,b:120},
         plot_bgcolor:"#fafafa",paper_bgcolor:"#fafafa",width:1150,height:720},
        {responsive:true});
}
render();
