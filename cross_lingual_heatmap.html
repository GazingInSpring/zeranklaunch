        if (isDelta() && isRel) return s+"Δ retention: "+(v>=0?"+":"")+v.toFixed(1)+"pp<br>Raw Δ: "+(raw[i][j]>=0?"+":"")+raw[i][j].toFixed(4);
        if (isDelta()) return s+"Δ NDCG@10: "+(v>=0?"+":"")+v.toFixed(4);
        if (isRel) return s+v.toFixed(1)+"% of En→En<br>Raw: "+raw[i][j].toFixed(4);
        return s+"NDCG@10: "+v.toFixed(4);
    }));

    const flat = z.flat(), mean = flat.reduce((a,b)=>a+b,0)/flat.length;
    const diag = []; for(let i=0;i<n;i++) diag.push(z[i][i]);
    const dm = diag.reduce((a,b)=>a+b,0)/diag.length;

    let statsHtml;
    if (isDelta() && isRel) {
        const pos = flat.filter(v=>v>0).length;
        statsHtml = "Mean Δ: <b>"+(mean>=0?"+":"")+mean.toFixed(1)+"pp</b> | Diagonal Δ: <b>"+(dm>=0?"+":"")+dm.toFixed(1)+"pp</b> | zembed better retention: <b>"+pos+"/"+flat.length+"</b>";
    } else if (isDelta()) {
        const pos = flat.filter(v=>v>0).length;
        statsHtml = "Mean Δ: <b>"+(mean>=0?"+":"")+mean.toFixed(4)+"</b> | Diagonal Δ: <b>"+(dm>=0?"+":"")+dm.toFixed(4)+"</b> | En→En Δ: <b>"+(enEn>=0?"+":"")+enEn.toFixed(4)+"</b> | zembed wins: <b>"+pos+"/"+flat.length+"</b>";
    } else if (isRel) {
        statsHtml = "Mean: <b>"+mean.toFixed(1)+"%</b> | Diagonal: <b>"+dm.toFixed(1)+"%</b> | En→En: <b>"+enEn.toFixed(4)+"</b>";
    } else {
        statsHtml = "Mean: <b>"+mean.toFixed(4)+"</b> | Diagonal: <b>"+dm.toFixed(4)+"</b> | En→En: <b>"+enEn.toFixed(4)+"</b>";
    }
    document.getElementById("stats").innerHTML = statsHtml;

    let titleMetric;
    if (isDelta() && isRel) titleMetric = "Δ %-of-En→En retention (zembed-1 − voyage-4)";
    else if (isDelta()) titleMetric = "Δ NDCG@10 (zembed-1 − voyage-4)";
    else if (isRel) titleMetric = "% of En→En";
    else titleMetric = "NDCG@10";

    const colorbarTitle = isDelta() && isRel ? "Δ pp" : isDelta() ? "Δ NDCG@10" : isRel ? "% of En→En" : "NDCG@10";

    Plotly.react("chart",[{type:"heatmap",z:z,x:L,y:L,zmin:zmin,zmax:zmax,colorscale:cs,
        hoverinfo:"text",hovertext:ht,showscale:true,
        colorbar:{title:{text:colorbarTitle},len:0.85}}],
        {title:{text:curModel+" — "+(DATA.vertical_labels[curVert]||curVert)+" — "+titleMetric,font:{size:16,family:"Inter"}},
         xaxis:{title:"Document Language",tickfont:{size:10},tickangle:-45},
         yaxis:{title:"Query Language",tickfont:{size:10},autorange:"reversed"},
         annotations:ann,margin:{l:100,r:80,t:60,b:120},
         plot_bgcolor:"#fafafa",paper_bgcolor:"#fafafa",width:1150,height:720},
        {responsive:true});
}
render();
</script>
</body>
</html>
