    const ht = z.map((r,i) => r.map((v,j) => {
        const s = L[i]+" → "+L[j]+"<br>";
        return isRel ? s+v.toFixed(1)+"% of En→En<br>Raw: "+raw[i][j].toFixed(4) : s+"NDCG@10: "+v.toFixed(4);
    }));
    const flat=z.flat(), mean=flat.reduce((a,b)=>a+b,0)/flat.length;
    const diag=[]; for(let i=0;i<n;i++) diag.push(z[i][i]);
    const dm=diag.reduce((a,b)=>a+b,0)/diag.length;
    const vl = DATA.vertical_labels[curVert]||curVert;
    document.getElementById("stats").innerHTML = isRel
        ? "Mean: <b>"+mean.toFixed(1)+"%</b> | Diagonal: <b>"+dm.toFixed(1)+"%</b> | En→En: <b>"+enEn.toFixed(4)+"</b>"
        : "Mean: <b>"+mean.toFixed(4)+"</b> | Diagonal: <b>"+dm.toFixed(4)+"</b> | En→En: <b>"+enEn.toFixed(4)+"</b>";

    var chartDiv = document.getElementById("chart");
    var w = chartDiv.clientWidth || chartDiv.parentElement.clientWidth || 900;
    var plotH = w * 0.75 + 100;

    Plotly.react("chart",[{type:"heatmap",z:z,x:L,y:L,zmin:zmin,zmax:zmax,colorscale:cs,
        hoverinfo:"text",hovertext:ht,showscale:true,
        colorbar:{len:0.85}}],
        {title:{text:curModel+" — "+vl+" — "+(isRel?"% of En→En":"NDCG@10"),font:{size:20,family:"Inter"}},
         xaxis:{title:{text:"Document Language",font:{size:14}},tickfont:{size:12},tickangle:-45},
         yaxis:{title:{text:"Query Language",font:{size:14}},tickfont:{size:12},autorange:"reversed"},
         annotations:ann,margin:{l:90,r:60,t:50,b:100},
         plot_bgcolor:"#fafafa",paper_bgcolor:"#fafafa",
         width:w,height:plotH,autosize:false},
        {responsive:true});
}
render();
window.addEventListener("resize", render);
</script>
</body>
</html>
